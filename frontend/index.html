<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="TerraSight — Live climate signals, environmental data atlas, and U.S. metro-level environmental reports." />
    <title>TerraSight</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; }
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0a0e1a;
        color: #e2e8f0;
        -webkit-font-smoothing: antialiased;
      }
      a { color: inherit; }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(16px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes pulse-glow {
        0%, 100% { opacity: 0.6; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.3); }
      }
      @keyframes atmosphere-pulse {
        0%, 100% { opacity: 0.7; }
        50% { opacity: 1; }
      }
      .skeleton {
        background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
        background-size: 200% 100%;
        animation: shimmer 1.5s ease-in-out infinite;
        border-radius: 6px;
      }
      @media (max-width: 768px) {
        .desktop-nav { display: none !important; }
        .hamburger-btn { display: block !important; }
      }
      @media (min-width: 769px) {
        .hamburger-btn { display: none !important; }
      }
      /* Globe mobile adjustments */
      @media (max-width: 640px) {
        .globe-meta-overlay { display: none !important; }
        .globe-story-panel { display: none !important; }
        .layer-pill-text { display: none !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
